<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //conditional statements in JS-ALLOW CODE TO MAKE DECISIONS 
        //if statement
        
        //age validation for vote casting

        let age=23;
        if(age>=18){
            console.log(`${age} is a valid age of vote casting!`);
        }
        //if-else

        let myAge=10;
        if(myAge<18){
            console.log(`${myAge} is not valid age of vote casting!`);
        }
        else{
            console.log(`${myAge} is a valid age of vote casting!`);
        }
        // switch....

         let day=3;
        switch(day){
            case 1:
                console.log("Monday");
                break;
            case 2:
                console.log("Tuesday");
                break;
            case 3:
                console.log("Wednesday");
                break;
            case 4:
                console.log("Thursday");
                break;
            case 5:
                console.log("Friday");
                break;
            case 6:
                console.log("Saturday");
                break;
            case 7:
                console.log("Sunday");
                break;
            default:
                console.log("Invalid day");
        }

        // if else if else......

        let marks=65;
        if(marks>=90){
            console.log("Grade A");
        } else if(marks>=80){
            console.log("Grade B");
        } else if(marks>=70){
            console.log("Grade C");
        } else if(marks>=60){
            console.log("Grade D");
        } else {
            console.log("Grade F");
        }
    </script>
</body>
</html>
