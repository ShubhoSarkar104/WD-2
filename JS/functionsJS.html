        //Higher-order functions:- A higher-order function is a function that takes one or more functions as arguments,
        //map() is a higher-order function that creates a new array by applying a provided function to each element of the original array.
        //filter() is a higher-order function that creates a new array with all elements that pass a test implemented by the provided function.
        //reduce() is a higher-order function that applies a provided function against an accumulator and each element in the array (from left to right) to reduce it to a single value.
        //forEach() is a higher-order function that executes a provided function once for each array element.
