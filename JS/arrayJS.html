<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Array in JS
        //Array is a data structure that can hold multiple values of different types.
        //create array using array literal
        let studentList=["Shubham","Saini","Jaiswal","shubho"];
        console.log(studentList);
        console.log(typeof(studentList));
        //accessing array elements
        console.log(studentList[0]);//Shubham
        console.log(studentList[1]);//Saini
        console.log(studentList[2]);//Jaiswal
        console.log(studentList[3]);//shubho
        //array methods
        //push() method adds an element to the end of the array
        studentList.push("sanvi");
        console.log(studentList);
        //pop() method removes the last element from the array
        studentList.pop();
        console.log(studentList);
        //shift() method removes the first element from the array
        studentList.shift();
        console.log(studentList);
        //unshift() method adds an element to the beginning of the array
        studentList.unshift("Shubham");
        console.log(studentList);
    </script>
</body>
</html>
